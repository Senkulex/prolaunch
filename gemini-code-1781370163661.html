<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Запуск Професії — легальний фріланс у Бельгії</title>
<meta name="description" content="Легально почни працювати у своїй професії в Бельгії за 2–4 тижні — без відкриття фірми.">

<meta property="og:type" content="website">
<meta property="og:title" content="Запуск Професії — легальний фріланс у Бельгії">
<meta property="og:description" content="Легально почни працювати у своїй професії в Бельгії за 2–4 тижні — без відкриття фірми (через SMart/Tentoo).">
<meta property="og:url" content="https://prolaunch.netlify.app/">
<meta property="og:image" content="https://prolaunch.netlify.app/preview.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#080D1A;--ink-soft:#28324A;--paper:#C8CDD8;--card:#D8DCE6;
    --line:#B0B8C8;--emerald:#0B7A53;--emerald-soft:#B8D8C8;
    --amber:#C98A1E;--strike:#6A7488;
    --display:'Manrope',system-ui,sans-serif;
    --body:'IBM Plex Sans',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);line-height:1.55;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}
  .eyebrow{font-family:var(--mono);font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--emerald);font-weight:500;}
  h1,h2,h3{font-family:var(--display);line-height:1.08;letter-spacing:-.02em}
  a{color:inherit}
  .lang-sw{display:flex;gap:4px;align-items:center}
  .lang-sw button{font-family:var(--mono);font-size:.75rem;letter-spacing:.06em;font-weight:600;background:none;border:1.5px solid var(--line);border-radius:6px;padding:4px 9px;cursor:pointer;color:var(--ink-soft);transition:all .15s;}
  .lang-sw button:hover{border-color:var(--emerald);color:var(--emerald)}
  .lang-sw button.active{background:var(--emerald);color:#fff;border-color:var(--emerald)}
  .btn{display:inline-flex;align-items:center;gap:.55em;font-family:var(--display);font-weight:700;font-size:1.02rem;background:var(--emerald);color:#fff;padding:16px 28px;border-radius:10px;text-decoration:none;transition:transform .18s,box-shadow .18s,background .18s;box-shadow:0 6px 18px rgba(11,122,83,.22);}
  .btn:hover{transform:translateY(-2px);background:#0a6a48;box-shadow:0 10px 26px rgba(11,122,83,.30)}
  .btn:focus-visible{outline:3px solid var(--amber);outline-offset:3px}
  .btn .arr{transition:transform .18s}
  .btn:hover .arr{transform:translateX(4px)}
  
  header.hero{padding:28px 0 36px;position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;top:-180px;right:-160px;width:520px;height:520px;background:radial-gradient(circle,rgba(11,122,83,.10),transparent 65%);z-index:0;}
  .hero .wrap{position:relative;z-index:1}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 30px}
  .brand{font-family:var(--display);font-weight:800;font-size:1.12rem;letter-spacing:-.02em}
  .brand .dot{color:var(--emerald)}
  
  /* Pilot Badge */
  .pilot-badge {display:inline-flex; align-items:center; background:rgba(201,138,30,.15); color:var(--amber); padding:6px 14px; border-radius:20px; font-family:var(--mono); font-size:0.75rem; letter-spacing:0.05em; font-weight:700; margin-bottom:16px; border:1px solid rgba(201,138,30,.3);}
  
  .hero h1{font-size:clamp(2.5rem,6.2vw,4.5rem);font-weight:800;max-width:14ch;margin-bottom:13px;}
  .hero h1 .accent{color:var(--emerald)}
  .status{display:inline-flex;flex-wrap:wrap;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:14px;}
  .status .lbl{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
  .status .was{color:var(--strike);text-decoration:line-through;text-decoration-thickness:2px;font-size:.98rem}
  .status .to{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:.98rem}
  .status .arrow{color:var(--emerald);font-weight:700}
  .status .stamp{font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--emerald);background:var(--emerald-soft);border-radius:6px;padding:3px 8px;font-weight:500;}
  .hero .sub{font-size:1.18rem;color:var(--ink-soft);max-width:46ch;margin-bottom:17px}
  .hero .cta-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px; margin-bottom:18px;}
  .hero .trust{font-size:.92rem;color:var(--ink-soft);max-width:30ch}
  
  /* A-card note */
  .acard-note {font-size:0.9rem; color:var(--ink-soft); display:inline-block; background:var(--card); padding:8px 16px; border-radius:8px; border:1px solid var(--line); font-weight:500;}

  section{padding:38px 0;border-top:1px solid var(--line)}
  .sec-head{max-width:52ch;margin-bottom:22px}
  .sec-head h2{font-size:clamp(1.8rem,3.6vw,2.7rem);font-weight:700;margin:7px 0 0}
  .sec-head p{color:var(--ink-soft);font-size:1.05rem;margin-top:8px}
  
  .pain-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  .pain{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px 14px;font-size:1.0rem;position:relative;padding-left:44px;}
  .pain::before{content:"";position:absolute;left:14px;top:16px;width:14px;height:14px;border-radius:3px;border:2px solid var(--strike);}
  
  /* Comparison Table */
  .table-wrap {overflow-x:auto; margin-top:24px;}
  .comp-table {width:100%; border-collapse:collapse; background:var(--card); border-radius:14px; overflow:hidden; border:1px solid var(--line);}
  .comp-table th, .comp-table td {padding:16px; text-align:left; border-bottom:1px solid var(--line);}
  .comp-table th {background:var(--ink); color:#fff; font-family:var(--display); font-weight:600; font-size:1.05rem;}
  .comp-table td {color:var(--ink);}
  .comp-table tr td:first-child {font-weight:600; background:rgba(255,255,255,0.1);}
  .comp-table .highlight {background:var(--emerald-soft); color:var(--emerald); font-weight:700; border-left:2px solid var(--emerald); border-right:2px solid var(--emerald);}
  .comp-table th.highlight {background:var(--emerald); color:#fff; border:none;}
  
  .solution{background:var(--ink);color:#fff;border-radius:16px;padding:26px 28px}
  .solution .eyebrow{color:#5FD0A2}
  .solution h2{color:#fff;font-size:clamp(1.7rem,3.4vw,2.4rem);font-weight:700;margin:7px 0 9px;max-width:22ch}
  .solution p{color:#C3CBDA;font-size:1.12rem;max-width:60ch}
  .solution .pill{display:inline-block;margin-top:12px;font-family:var(--mono);font-size:.78rem;letter-spacing:.08em;color:#5FD0A2;border:1px solid rgba(95,208,162,.35);border-radius:999px;padding:7px 14px}
  
  .steps{position:relative;display:grid;gap:0}
  .step{display:grid;grid-template-columns:52px 1fr;gap:14px;padding:11px 0;position:relative}
  .step:not(:last-child)::after{content:"";position:absolute;left:25px;top:44px;bottom:-10px;width:2px;background:var(--line);}
  .step .num{width:52px;height:52px;border-radius:50%;background:var(--card);border:2px solid var(--emerald);color:var(--emerald);font-family:var(--display);font-weight:800;font-size:1.2rem;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
  .step h3{font-size:1.1rem;font-weight:700;margin-bottom:3px}
  .step p{color:var(--ink-soft);font-size:1.05rem;max-width:54ch}
  
  .fit{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .fit-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .fit-card.yes{border-color:rgba(11,122,83,.35)}
  .fit-card h3{font-size:1.35rem;font-weight:700;margin-bottom:6px}
  .fit-card .tag{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase}
  .fit-card.yes .tag{color:var(--emerald)}
  .fit-card.no .tag{color:var(--amber)}
  .fit-card ul{list-style:none;margin-top:10px;display:grid;gap:7px}
  .fit-card li{padding-left:26px;position:relative;color:var(--ink-soft)}
  .fit-card.yes li::before{content:"✓";position:absolute;left:0;color:var(--emerald);font-weight:700}
  .fit-card.no li::before{content:"–";position:absolute;left:0;color:var(--amber);font-weight:700}
  
  .price{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;display:grid;grid-template-columns:1.2fr 1fr;gap:22px;align-items:center}
  .price .amount{font-family:var(--display);font-weight:800;font-size:3.6rem;line-height:1;letter-spacing:-.03em}
  
  /* DISCOUNT BADGE */
  .discount-badge {display:inline-block; margin-top:12px; padding:10px 16px; border:2px dashed var(--emerald); border-radius:8px; background:rgba(11,122,83,0.08); color:var(--emerald); font-family:var(--body); font-size:0.95rem; font-weight:700;}
  
  .price .pname{font-family:var(--mono);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--emerald);margin-bottom:14px;display:block}
  .price ul{list-style:none;display:grid;gap:7px;margin-top:4px}
  .price li{padding-left:26px;position:relative;color:var(--ink-soft)}
  .price li::before{content:"✓";position:absolute;left:0;color:var(--emerald);font-weight:700}
  .price .note{font-size:.92rem;color:var(--ink-soft);margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
  
  .pilot-text {color:var(--amber); font-weight:600; margin-top:14px; display:inline-block; font-size:0.95rem;}

  .final{text-align:center;background:linear-gradient(180deg,var(--paper),#EAEFF6)}
  .final h2{font-size:clamp(1.7rem,3.6vw,2.4rem);font-weight:800;margin-bottom:10px}
  .final p{color:var(--ink-soft);font-size:1.05rem;max-width:44ch;margin:0 auto 18px}
  
  footer{padding:24px 0 32px;border-top:1px solid var(--line);color:var(--ink-soft);font-size:.86rem}
  footer .wrap{display:flex;flex-wrap:wrap;gap:16px 30px;justify-content:space-between;align-items:center}
  .footer-left{display:grid;gap:6px;max-width:60ch}
  footer .brand{font-size:1rem;color:var(--ink);margin:0}
  .github-link{text-decoration:none; white-space:nowrap; display:inline-flex; align-items:center; gap:8px; color:var(--ink-soft); transition:color .15s;}
  .github-link span{text-decoration:underline; text-underline-offset:3px;}
  .github-link:hover{color:var(--emerald)}

  .reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
  .reveal.in{opacity:1;transform:none}
  .qform{max-width:620px;margin:28px auto 0;text-align:left}
  .qstep{display:none}
  .qstep.active{display:block}
  .qlbl{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--emerald);margin-bottom:10px}
  .qh{font-family:var(--display);font-size:1.35rem;font-weight:700;margin-bottom:8px;line-height:1.2}
  .qsub{color:var(--ink-soft);font-size:.97rem;margin-bottom:14px}
  .qopts{display:grid;gap:9px;margin-top:14px}
  .qopt{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:13px 16px;text-align:left;font-family:var(--body);font-size:1rem;color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s;font-weight:500;}
  .qopt:hover{border-color:var(--emerald);background:var(--emerald-soft)}
  .qtxt{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-family:var(--body);font-size:1rem;color:var(--ink);resize:vertical;margin-top:10px;}
  .qtxt:focus{outline:none;border-color:var(--emerald)}
  .qfields{display:grid;gap:10px;margin-top:14px;margin-bottom:4px}
  .qinp{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-family:var(--body);font-size:1rem;color:var(--ink);}
  .qinp:focus{outline:none;border-color:var(--emerald)}
  .result{text-align:center;padding:10px 0}
  .res-icon{width:56px;height:56px;border-radius:50%;background:var(--emerald-soft);color:var(--emerald);font-size:1.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
  .res-list{list-style:none;text-align:left;display:grid;gap:8px;margin-top:12px;background:var(--card);border-radius:12px;padding:16px 18px;border:1px solid var(--line)}
  .res-list li{padding-left:18px;position:relative;color:var(--ink-soft)}
  .res-list li::before{content:"→";position:absolute;left:0;color:var(--emerald);font-weight:700}
  .res-list a{color:var(--emerald);text-decoration:underline;text-underline-offset:3px}
  
  .qback {background:rgba(255,255,255,0.4); border:1.5px solid var(--line); border-radius:8px; color:var(--ink-soft); font-family:var(--mono); font-size:0.8rem; letter-spacing:0.04em; cursor:pointer; margin-bottom:16px; display:inline-flex; align-items:center; justify-content:center; gap:6px; text-decoration:none; padding:8px 16px; transition:all .15s;}
  .qback:hover {border-color:var(--emerald); color:var(--emerald); background:var(--emerald-soft);}

  @media(max-width:760px){
    .topbar{padding-bottom:22px}
    .pain-grid,.fit,.price{grid-template-columns:1fr}
    .solution{padding:20px 18px}
    .price{padding:16px}
    .price .amount{font-size:3rem}
    section{padding:30px 0}
    .step{grid-template-columns:44px 1fr;gap:10px}
    .step .num{width:44px;height:44px;font-size:1.1rem}
    .step:not(:last-child)::after{left:21px;top:38px}
    .lang-sw button{padding:3px 7px;font-size:.7rem}
    footer .wrap {justify-content:center; text-align:center;}
    .footer-left {justify-items:center;}
    .comp-table {font-size:0.85rem;}
    .comp-table th, .comp-table td {padding:12px 8px;}
  }
  @media(prefers-reduced-motion:reduce){
    *{scroll-behavior:auto}
    .reveal{opacity:1;transform:none;transition:none}
    .btn,.btn .arr{transition:none}
  }
</style>
</head>
<body>

<header class="hero">
  <div class="wrap">
    <div class="topbar">
      <div class="brand">Професія<span class="dot">.</span></div>
      <div class="lang-sw">
        <button onclick="setLang('uk')" id="btn-uk" class="active">UA</button>
        <button onclick="setLang('en')" id="btn-en">EN</button>
        <button onclick="setLang('ru')" id="btn-ru">RU</button>
      </div>
    </div>

    <div class="pilot-badge" data-t="badge_pilot"></div>
    <p class="eyebrow" data-t="eyebrow_hero"></p>
    <h1><span data-t="h1_main"></span> <span class="accent" data-t="h1_accent"></span><span data-t="h1_end"></span></h1>

    <div class="status">
      <span class="lbl" data-t="status_lbl"></span>
      <span class="was" data-t="status_was"></span>
      <span class="arrow">→</span>
      <span class="to"><span data-t="status_to"></span> <span class="stamp" data-t="status_stamp"></span></span>
    </div>

    <p class="sub" data-t="hero_sub"></p>
    <div class="cta-row">
      <a class="btn" href="#screening"><span data-t="btn_main"></span> <span class="arr">→</span></a>
      <span class="trust" data-t="hero_trust"></span>
    </div>
    <div class="acard-note" data-t="note_acard"></div>
  </div>
</header>

<section class="reveal">
  <div class="wrap">
    <div class="sec-head">
      <p class="eyebrow" data-t="pain_eyebrow"></p>
      <h2 data-t="pain_h2"></h2>
    </div>
    <div class="pain-grid">
      <div class="pain" data-t="pain1"></div>
      <div class="pain" data-t="pain2"></div>
      <div class="pain" data-t="pain3"></div>
      <div class="pain" data-t="pain4"></div>
    </div>
  </div>
</section>

<section class="reveal">
  <div class="wrap">
    <div class="sec-head">
      <h2 data-t="comp_title"></h2>
      <p data-t="comp_sub"></p>
    </div>
    <div class="table-wrap">
      <table class="comp-table">
        <tr>
          <th data-t="comp_th1"></th>
          <th data-t="comp_th2"></th>
          <th data-t="comp_th3"></th>
          <th class="highlight" data-t="comp_th4"></th>
        </tr>
        <tr>
          <td data-t="comp_r1_1"></td>
          <td data-t="comp_r1_2"></td>
          <td data-t="comp_r1_3"></td>
          <td class="highlight" data-t="comp_r1_4"></td>
        </tr>
        <tr>
          <td data-t="comp_r2_1"></td>
          <td data-t="comp_r2_2"></td>
          <td data-t="comp_r2_3"></td>
          <td class="highlight" data-t="comp_r2_4"></td>
        </tr>
        <tr>
          <td data-t="comp_r3_1"></td>
          <td data-t="comp_r3_2"></td>
          <td data-t="comp_r3_3"></td>
          <td class="highlight" data-t="comp_r3_4"></td>
        </tr>
      </table>
    </div>
  </div>
</section>

<section class="reveal">
  <div class="wrap">
    <div class="solution">
      <p class="eyebrow" data-t="sol_eyebrow"></p>
      <h2 data-t="sol_h2"></h2>
      <p data-t="sol_p"></p>
      <span class="pill" data-t="sol_pill"></span>
    </div>
  </div>
</section>

<section class="reveal">
  <div class="wrap">
    <div class="sec-head">
      <p class="eyebrow" data-t="how_eyebrow"></p>
      <h2 data-t="how_h2"></h2>
    </div>
    <div class="steps">
      <div class="step"><div class="num">1</div><div><h3 data-t="step1_h"></h3><p data-t="step1_p"></p></div></div>
      <div class="step"><div class="num">2</div><div><h3 data-t="step2_h"></h3><p data-t="step2_p"></p></div></div>
      <div class="step"><div class="num">3</div><div><h3 data-t="step3_h"></h3><p data-t="step3_p"></p></div></div>
      <div class="step"><div class="num">4</div><div><h3 data-t="step4_h"></h3><p data-t="step4_p"></p></div></div>
    </div>
  </div>
</section>

<section class="reveal">
  <div class="wrap">
    <div class="sec-head">
      <p class="eyebrow" data-t="fit_eyebrow"></p>
      <h2 data-t="fit_h2"></h2>
    </div>
    <div class="fit">
      <div class="fit-card yes">
        <span class="tag" data-t="fit_yes_tag"></span>
        <h3 data-t="fit_yes_h"></h3>
        <ul>
          <li data-t="fit_yes1"></li><li data-t="fit_yes2"></li>
          <li data-t="fit_yes3"></li><li data-t="fit_yes4"></li>
        </ul>
      </div>
      <div class="fit-card no">
        <span class="tag" data-t="fit_no_tag"></span>
        <h3 data-t="fit_no_h"></h3>
        <ul>
          <li data-t="fit_no1"></li><li data-t="fit_no2"></li>
          <li data-t="fit_no3"></li><li data-t="fit_no4"></li>
        </ul>
      </div>
    </div>
  </div>
</section>

<section class="reveal">
  <div class="wrap">
    <div class="sec-head">
      <p class="eyebrow" data-t="price_eyebrow"></p>
      <h2 data-t="price_h2"></h2>
    </div>
    <div class="price">
      <div>
        <span class="pname" data-t="price_pname"></span>
        <div class="amount">€600</div>
        <div class="discount-badge" data-t="discount_badge"></div>
        <p class="note" data-t="price_note"></p>
        <span class="pilot-text" data-t="pilot_urgency"></span>
      </div>
      <ul>
        <li data-t="pr1"></li><li data-t="pr2"></li>
        <li data-t="pr3"></li><li data-t="pr4"></li><li data-t="pr5"></li>
      </ul>
    </div>
  </div>
</section>

<section class="final reveal" id="screening">
  <div class="wrap">
    <h2 data-t="final_h2"></h2>
    <p data-t="final_p"></p>

    <div class="qform" id="qform">
      <div class="qstep active" data-step="1">
        <p class="qlbl" data-t="q_step" data-n="1"></p>
        <h3 class="qh" data-t="q1_h"></h3>
        <div class="qopts" id="q1opts"></div>
      </div>
      <div class="qstep" data-step="2">
        <button class="qback" onclick="goBack()">← <span data-t="btn_back"></span></button>
        <p class="qlbl" data-t="q_step" data-n="2"></p>
        <h3 class="qh" data-t="q2_h"></h3>
        <p class="qsub" data-t="q2_sub"></p>

var currentLang = 'uk';
var answers = {};
var stepHistory = [];
var currentStepId = '1';

function t(key){ return (T[currentLang][key])||''; }

function renderDynamic(){
  document.querySelectorAll('[data-t]').forEach(function(el){
    var key = el.getAttribute('data-t');
    var n = el.getAttribute('data-n');
    var val = t(key);
    if(n) val = val.replace('{n}', n);
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA') el.placeholder = val;
    else el.textContent = val;
  });
  document.querySelectorAll('[data-placeholder-t]').forEach(function(el){
    el.placeholder = t(el.getAttribute('data-placeholder-t'));
  });
  var q4 = document.getElementById('q4txt');
  if(q4) q4.placeholder = t('q4_placeholder');

  renderOpts('q1opts','q1opts',2,'prof');
  renderOpts2('q2opts','q2opts');
  renderOpts2('q3opts','q3opts');
  renderOpts2('q5opts','q5opts');
  renderOpts2('q6opts','q6opts');
  renderOpts2('q7opts','q7opts');
}

function renderOpts(containerId, tKey, defaultNext, answerKey){
  var c = document.getElementById(containerId);
  if(!c) return;
  c.innerHTML='';
  (T[currentLang][tKey]||[]).forEach(function(item){
    var btn = document.createElement('button');
    btn.className='qopt';
    btn.textContent=item.label;
    btn.dataset.next = item.next || String(defaultNext);
    btn.dataset.key = answerKey;
    btn.dataset.val = item.v;
    c.appendChild(btn);
  });
  bindOpts(c);
}

function renderOpts2(containerId, tKey){
  var c = document.getElementById(containerId);
  if(!c) return;
  c.innerHTML='';
  (T[currentLang][tKey]||[]).forEach(function(item){
    var btn = document.createElement('button');
    btn.className='qopt';
    btn.textContent=item.label;
    btn.dataset.next = item.next;
    var keyMap={q1opts:'prof',q2opts:'regulated',q3opts:'acard',q5opts:'goal',q6opts:'budget',q7opts:'timing'};
    btn.dataset.key = keyMap[containerId]||containerId;
    btn.dataset.val = item.v;
    c.appendChild(btn);
  });
  bindOpts(c);
}

function bindOpts(container){
  container.querySelectorAll('.qopt').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(this.dataset.key) answers[this.dataset.key]=this.dataset.val;
      showStep(this.dataset.next);
    });
  });
}

function showStep(step, isBack){
  if(!isBack && currentStepId !== step) {
    stepHistory.push(currentStepId);
  }
  currentStepId = step;
  
  document.querySelectorAll('.qstep').forEach(function(el){el.classList.remove('active');});
  var el = document.querySelector('[data-step="'+step+'"]');
  if(el){
    el.classList.add('active');
    el.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function goBack(){
  if(stepHistory.length > 0){
    var prev = stepHistory.pop();
    showStep(prev, true);
  }
}

function setLang(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  ['uk','en','ru'].forEach(function(l){
    document.getElementById('btn-'+l).classList.toggle('active', l===lang);
  });
  renderDynamic();
}

document.querySelectorAll('.qnext').forEach(function(btn){
  btn.addEventListener('click',function(){
    var src=this.dataset.src, key=this.dataset.key, next=this.dataset.next;
    if(src){var el=document.getElementById(src);if(el)answers[key]=el.value;}
    showStep(next);
  });
});

var ff = document.getElementById('qfinalform');
if(ff){
  ff.addEventListener('submit',function(e){
    e.preventDefault();
    document.getElementById('f_prof').value=answers.prof||'';
    document.getElementById('f_reg').value=answers.regulated||'';
    document.getElementById('f_acard').value=answers.acard||'';
    document.getElementById('f_service').value=answers.service||'';
    document.getElementById('f_goal').value=answers.goal||'';
    document.getElementById('f_budget').value=answers.budget||'';
    document.getElementById('f_timing').value=answers.timing||'';
    document.getElementById('f_name').value=document.getElementById('cname').value;
    document.getElementById('f_contact').value=document.getElementById('ctg').value;
    var g=answers.goal||'', ti=answers.timing||'';
    var isGreen=(g==='freelancer'||g==='own-biz')&&ti==='soon';
    
    fetch(ff.action,{method:'POST',body:new FormData(ff),headers:{Accept:'application/json'}})
      .then(function(){showStep(isGreen?'green':'amber');})
      .catch(function(){showStep(isGreen?'green':'amber');});
  });
}

(function(){
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
  },{threshold:.12});
  document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
})();

renderDynamic();
</script>
